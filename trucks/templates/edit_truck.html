{% extends "layout.html" %}

{% block content %}
<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">✏️ Edit Truck</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Plate Number</label>
                {{ form.plate_number }}
            </div>

            <div class="mb-3">
                <label class="form-label">Capacity (Tons)</label>
                {{ form.capacity_tons }}
            </div>

            <div class="mb-3">
                <label class="form-label">Driver</label>
                {{ form.driver }}
            </div>

            <div class="d-flex justify-content-between">
                <a href="{% url 'truck_list' %}" class="btn btn-secondary">
                    ⬅️ Back
                </a>

                <button type="submit" class="btn btn-success">
                    💾 Update Truck
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
